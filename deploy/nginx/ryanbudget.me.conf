# /etc/nginx/sites-available/ryanbudget.me
# sudo ln -sf /etc/nginx/sites-available/ryanbudget.me /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name ryanbudget.me www.ryanbudget.me;
    return 301 https://ryanbudget.me$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ryanbudget.me www.ryanbudget.me;

    # certbot paths — adjust if different
    ssl_certificate     /etc/letsencrypt/live/ryanbudget.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ryanbudget.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
