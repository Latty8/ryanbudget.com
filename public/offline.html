<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d9488" />
    <title>Offline — Paycheck Planner</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3f9;
        --fg: #0a1628;
        --muted: #52657c;
        --accent: #0d9488;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 1.5rem;
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
        margin: 0 0 1rem;
        max-width: 22rem;
      }
      a {
        color: var(--accent);
        font-weight: 500;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>You&apos;re offline</h1>
      <p>Paycheck Planner needs a connection to sync. Open the app again when you&apos;re back online.</p>
      <p><a href="/dashboard">Try dashboard</a></p>
    </div>
  </body>
</html>
